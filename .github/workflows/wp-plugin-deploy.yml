name: Deploy to WordPress.org
on:
    push:
        tags:
            - '*'
env:
    plugin_name: vk-post-author-display
jobs:
    check_tag:
        name: Verify semver tag
        runs-on: ubuntu-latest
        steps:
            - name: Verify semver tag
              run: |
                  if [[ ! "${{ github.ref_name }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                      echo "Tag '${{ github.ref_name }}' is not a valid semver (X.Y.Z). Aborting workflow."
                      exit 1
                  fi
    smoke_test:
        name: Smoke Test
        runs-on: ubuntu-latest
        needs: [check_tag]
        steps:
            - uses: actions/checkout@v4
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20.x
            - name: Install NPM Scripts
              run: npm install
            - name: Create dist
              run: npm run dist
            - name: Setup wp-env override for dist
              run: |
                  echo '{"plugins":["./dist/${{ env.plugin_name }}"]}' > wp-env.override.json
            - name: Start wp-env
              run: npx wp-env start
            - name: Smoke test
              # vektor-inc/wp-actions main as of 2026-03-18
              uses: vektor-inc/wp-actions/smoke-test@90f5a231bc956543bf235f36be4928d57af2edab
    php_unit:
        runs-on: ubuntu-latest
        needs: [check_tag]
        strategy:
            matrix:
                php-versions: ['8.1']
                wp-versions: ['6.4', '6.5', '6.6']
        name: PHP Unit Test on PHP ${{ matrix.php-versions }} / WP ${{ matrix.wp-versions }} Test
        services:
            mysql:
                image: mysql:5.7
                ports:
                    - 3306
                env:
                    MYSQL_ROOT_PASSWORD: wordpress
                    MYSQL_DATABASE: wordpress
                    MYSQL_USER: wordpress
                    MYSQL_PASSWORD: wordpress
        steps:
            - uses: actions/checkout@v4
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20.x
            - name: Cache vendor
              uses: actions/cache@v4
              with:
                  path: vendor
                  key: ${{ runner.os }}-php${{ matrix.php-versions }}-${{ hashFiles('**/composer.lock') }}
            - name: Setup PHP ${{ matrix.php-versions }}
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php-versions }}
            - name: Install NPM Scripts
              run: npm install
            - name: Install Composer Packages
              run: composer install
            - name: Install WP-CLI
              run: |
                  curl -O https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
                  chmod +x wp-cli.phar
                  mv wp-cli.phar /usr/local/bin/wp
            - name: Install several WordPress version by wp-env.override.json
              run: |
                  n=0
                  until (( n >= 5 ))
                  do
                      WP_ENV_CORE=WordPress/WordPress#${{ matrix.wp-versions }} WP_ENV_PHP_VERSION=${{ matrix.php-versions }} npm run wp-env start --update && break
                      n=$((n+1))
                      echo "Retrying wp-env start --update ($n)..."
                      sleep 15
                  done
                  (( n < 5 )) || exit 1
            - name: Check WordPress Version
              run: npm run wp-env run cli wp core version
            - name: Build
              run: npm run build
            - name: Start Environment
              run: npx wp-env start && sudo chmod -R 777 ~/wp-env
            - name: Run PHP Unit Test
              run: npm run phpunit
    deploy:
        name: deploy to plugin directory
        runs-on: ubuntu-latest
        needs: [smoke_test, php_unit]
        steps:
            - uses: actions/checkout@v4
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20.x
            - name: Install NPM Scripts
              run: npm install
            - name: Create dist
              run: npm run dist
            - name: WordPress Plugin Deploy
              # 10up/action-wordpress-plugin-deploy 2.3.0 / stable
              uses: 10up/action-wordpress-plugin-deploy@54bd289b8525fd23a5c365ec369185f2966529c2
              env:
                  BUILD_DIR: dist/${{ env.plugin_name }}
                  SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
                  SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
    release:
        name: release
        runs-on: ubuntu-latest
        needs: [smoke_test, php_unit]
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v4
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20.x
            - name: Install NPM Scripts
              run: npm install
            - name: Create dist
              run: npm run dist
            - name: Create Release
              # softprops/action-gh-release v2.6.1 / v2
              uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
              with:
                  generate_release_notes: true
                  files: dist/${{ env.plugin_name }}.zip
