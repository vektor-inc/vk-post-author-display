name: Deploy to WordPress.org
on:
    push:
        tags:
            - '**'
env:
    plugin_name: vk-post-author-display
jobs:
    check_tag:
        name: Verify semver tag
        runs-on: ubuntu-latest
        steps:
            - name: Verify semver tag
              run: |
                  if [[ ! "${{ github.ref_name }}" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
                      echo "Tag '${{ github.ref_name }}' is not a valid semver (X.Y.Z). Aborting workflow."
                      exit 1
                  fi
    build_dist:
        name: Build dist
        runs-on: ubuntu-latest
        needs: [check_tag]
        steps:
            - uses: actions/checkout@v4
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20.x
            - name: Install NPM Scripts
              run: npm install
            - name: Create dist
              run: npm run dist
            - name: Upload dist artifact
              uses: actions/upload-artifact@v4
              with:
                  name: dist
                  path: dist/
                  if-no-files-found: error
    smoke_test:
        name: Smoke Test
        runs-on: ubuntu-latest
        needs: [build_dist]
        steps:
            - uses: actions/checkout@v4
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20.x
            - name: Install NPM Scripts
              run: npm install
            - name: Install Composer Packages
              run: composer install --optimize-autoloader --prefer-dist --no-dev
            - name: Download dist artifact
              uses: actions/download-artifact@v4
              with:
                  name: dist
                  path: dist/
            - name: Setup wp-env override for dist
              run: |
                  echo '{"plugins":["./dist/${{ env.plugin_name }}"]}' > wp-env.override.json
            - name: Start wp-env
              run: |
                  n=0
                  until (( n >= 3 ))
                  do
                      npx wp-env start --update && break
                      n=$((n+1))
                      echo "Retrying wp-env start --update ($n)..."
                      sleep 15
                  done
                  (( n < 3 )) || exit 1
            - name: Smoke test
              # vektor-inc/wp-actions main as of 2026-03-18
              uses: vektor-inc/wp-actions/smoke-test@90f5a231bc956543bf235f36be4928d57af2edab
    php_unit:
        runs-on: ubuntu-latest
        needs: [build_dist]
        strategy:
            matrix:
                php-versions: ['7.4', '8.1']
                wp-versions: ['6.7', '6.8', '6.9']
        name: PHP Unit Test on PHP ${{ matrix.php-versions }} / WP ${{ matrix.wp-versions }} Test
        services:
            mysql:
                image: mysql:8.0
                ports:
                    - 3306
                env:
                    MYSQL_ROOT_PASSWORD: wordpress
                    MYSQL_DATABASE: wordpress
                    MYSQL_USER: wordpress
                    MYSQL_PASSWORD: wordpress
        steps:
            - uses: actions/checkout@v4
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20.x
            - name: Cache vendor
              uses: actions/cache@v4
              with:
                  path: vendor
                  key: ${{ runner.os }}-php${{ matrix.php-versions }}-${{ hashFiles('**/composer.lock') }}
            - name: Setup PHP ${{ matrix.php-versions }}
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php-versions }}
            - name: Install NPM Scripts
              run: npm install
            - name: Install Composer Packages
              run: composer install
            - name: Install WP-CLI
              run: |
                  curl -O https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
                  chmod +x wp-cli.phar
                  sudo mv wp-cli.phar /usr/local/bin/wp
            - name: Download dist artifact
              uses: actions/download-artifact@v4
              with:
                  name: dist
                  path: dist/
            - name: Copy test dependencies into dist for phpunit
              run: |
                  cp -r vendor dist/${{ env.plugin_name }}/vendor
                  for f in .phpunit.xml phpunit.xml phpunit.xml.dist; do
                    [ -f "$f" ] && cp "$f" "dist/${{ env.plugin_name }}/$f" || true
                  done
                  [ -d tests ] && cp -r tests "dist/${{ env.plugin_name }}/tests" || true
            - name: Create wp-env.override.json for dist
              run: |
                  printf '{"plugins": ["./dist/%s"]}' "${{ env.plugin_name }}" > wp-env.override.json
            - name: Install several WordPress version by wp-env.override.json
              run: |
                  n=0
                  until (( n >= 5 ))
                  do
                      WP_ENV_CORE=WordPress/WordPress#${{ matrix.wp-versions }} WP_ENV_PHP_VERSION=${{ matrix.php-versions }} npm run wp-env -- start --update && break
                      n=$((n+1))
                      echo "Retrying wp-env start --update ($n)..."
                      sleep 15
                  done
                  (( n < 5 )) || exit 1
            - name: Check WordPress Version
              run: npm run wp-env run cli wp core version
            - name: Set Permissions for Theme Directory
              run: |
                  sudo mkdir -p tests/themes
                  sudo chmod -R 777 tests/themes
            - name: Install Themes
              run: bash bin/install-theme.sh
            - name: Start Environment
              run: WP_ENV_CORE=WordPress/WordPress#${{ matrix.wp-versions }} WP_ENV_PHP_VERSION=${{ matrix.php-versions }} npx wp-env start && sudo chmod -R 777 ~/wp-env
            - name: Run PHP Unit Test
              run: npm run phpunit
    deploy:
        name: deploy to plugin directory
        runs-on: ubuntu-latest
        needs: [smoke_test, php_unit]
        steps:
            - uses: actions/checkout@v4
            - name: Download dist artifact
              uses: actions/download-artifact@v4
              with:
                  name: dist
                  path: dist/
            - name: WordPress Plugin Deploy
              # 10up/action-wordpress-plugin-deploy 2.3.0 / stable
              uses: 10up/action-wordpress-plugin-deploy@54bd289b8525fd23a5c365ec369185f2966529c2
              env:
                  BUILD_DIR: dist/${{ env.plugin_name }}
                  SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
                  SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
    release:
        name: release
        runs-on: ubuntu-latest
        needs: [smoke_test, php_unit]
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v4
            - name: Download dist artifact
              uses: actions/download-artifact@v4
              with:
                  name: dist
                  path: dist/
            - name: Create Release
              # softprops/action-gh-release v2.6.1 / v2
              uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
              with:
                  generate_release_notes: true
                  files: dist/${{ env.plugin_name }}.zip
